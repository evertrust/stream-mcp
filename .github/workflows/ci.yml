name: CI checks

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commitlint
    runs-on: runs-on=${{ github.run_id }}/runner=evertrust
    if: github.event_name == 'pull_request'
    steps:
      - name: Configure Runs-On
        uses: runs-on/action@v2

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint commits
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  validate:
    name: Validate
    runs-on: runs-on=${{ github.run_id }}/runner=evertrust
    steps:
      - name: Configure Runs-On
        uses: runs-on/action@v2

      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        # Hard gate: a high/critical advisory in the dependency tree fails CI.
        run: bun audit --audit-level=high

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Verify API truth
        run: bun run verify:truth

      - name: Test (with coverage gate)
        run: bun run test:coverage

      - name: Scenario suite
        run: bun run test:scenarios

      # QA E2E smoke deliberately does NOT run in CI: it needs live QA
      # credentials, and exposing them to the workflow (job- or step-level)
      # widens the supply-chain blast radius of every dependency the job
      # executes. Run it locally instead: `source .env.local && bun run
      # test:e2e:smoke`.
